# ══════════════════════════════════════════════════════════════════════════════
# docker-compose.yml — Nexus Compose / Vocal Vibecoding Factory
#
# USAGE :
#   docker compose up --build
#   docker compose up neo4j batfish
#   docker compose run app pytest
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── APPLICATION PRINCIPALE ─────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: nexus-compose
    restart: unless-stopped
    privileged: true
    # FIX : le CMD par défaut du Dockerfile ("python -m nexus_compose", sans
    # sous-commande) plante immédiatement — argparse déclare `cmd` comme
    # required=True (cf. nexus_compose/__main__.py). Combiné à
    # `restart: unless-stopped`, le conteneur crash-loopait en boucle dès
    # `docker compose up`. Ce service est un outil CLI/orchestrateur, pas un
    # serveur HTTP (EXPOSE 8080 dans le Dockerfile est vestigial — rien
    # n'écoute sur ce port dans le code). L'usage documenté en tête de ce
    # fichier ("docker compose run app pytest") suppose un conteneur qui
    # reste vivant pour des invocations ponctuelles via `run`/`exec` — même
    # principe que le service `leon` ci-dessous, qui override déjà sa propre
    # commande pour la même raison.
    command: ["tail", "-f", "/dev/null"]
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=nexuscompose
      - OPA_URL=http://opa:8181
      - THREAT_DRAGON_URL=http://threat-dragon:3000
      - BATFISH_HOST=batfish
      - PYTHONPATH=/app
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      neo4j:
        condition: service_healthy
      opa:
        condition: service_started
      batfish:
        condition: service_started
      threat-dragon:
        condition: service_started
    networks:
      - nexus-net

  # ── NEO4J ─────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: nexus-neo4j
    restart: unless-stopped
    environment:
      # FIX: NEO4J_PLUGINS quoté pour éviter que YAML interprète [ comme liste
      - NEO4J_AUTH=neo4j/nexuscompose
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "nexuscompose", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - nexus-net

  # ── OPEN POLICY AGENT ─────────────────────────────────────────────────────
  opa:
    image: openpolicyagent/opa:latest-static
    container_name: nexus-opa
    restart: unless-stopped
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-format=json
    ports:
      - "8181:8181"
    volumes:
      - ./policies:/policies
    networks:
      - nexus-net

  # ── BATFISH ───────────────────────────────────────────────────────────────
  batfish:
    image: batfish/allinone:latest
    container_name: nexus-batfish
    restart: unless-stopped
    ports:
      - "9996:9996"
      - "9997:9997"
    volumes:
      - batfish_data:/data
    networks:
      - nexus-net

  # ── OWASP THREAT DRAGON ───────────────────────────────────────────────────
  threat-dragon:
    image: owasp/threat-dragon:latest
    container_name: nexus-threat-dragon
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # FIX: ENCRYPTION_KEYS entre guillemets simples — le { et : cassaient le YAML
      - 'ENCRYPTION_KEYS=[{"isPrimary":true,"id":1,"value":"nexus-compose-key-32chars!!"}]'
      - ENCRYPTION_JWT_SIGNING_KEY=nexus-jwt-secret-key
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
    ports:
      - "3000:3000"
    networks:
      - nexus-net

  # ── LEON AI ───────────────────────────────────────────────────────────────
  leon:
    build:
      context: .
      dockerfile: Dockerfile
      target: leon
    container_name: nexus-leon
    restart: unless-stopped
    working_dir: /opt/leon
    command: npm start
    ports:
      - "1337:1337"
    environment:
      - NODE_ENV=production
    networks:
      - nexus-net

volumes:
  neo4j_data:
  neo4j_logs:
  batfish_data:

networks:
  nexus-net:
    driver: bridge
