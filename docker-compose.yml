# ══════════════════════════════════════════════════════════════════════════════
# docker-compose.yml — Nexus Compose / Vocal Vibecoding Factory
# Lance l'app + tous les services externes
#
# USAGE :
#   docker compose up --build          # Tout démarrer
#   docker compose up neo4j batfish    # Seulement certains services
#   docker compose run app pytest      # Lancer les tests
# ══════════════════════════════════════════════════════════════════════════════

version: "3.9"

services:

  # ── APPLICATION PRINCIPALE ─────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: nexus-compose
    restart: unless-stopped
    privileged: true          # requis pour Containerlab (manipulation réseau)
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=nexuscompose
      - OPA_URL=http://opa:8181
      - THREAT_DRAGON_URL=http://threat-dragon:3000
      - BATFISH_HOST=batfish
      - PYTHONPATH=/app
    volumes:
      - .:/app                          # Hot-reload du code
      - /var/run/docker.sock:/var/run/docker.sock  # Pour Containerlab
    depends_on:
      neo4j:
        condition: service_healthy
      opa:
        condition: service_started
      batfish:
        condition: service_started
      threat-dragon:
        condition: service_started
    networks:
      - nexus-net

  # ── NEO4J (Knowledge Graph) ────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: nexus-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/nexuscompose
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    ports:
      - "7474:7474"   # Interface web Neo4j Browser
      - "7687:7687"   # Bolt protocol (driver Python)
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "nexuscompose", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - nexus-net

  # ── OPEN POLICY AGENT (Politiques globales) ────────────────────────────────
  opa:
    image: openpolicyagent/opa:latest-static
    container_name: nexus-opa
    restart: unless-stopped
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-format=json
    ports:
      - "8181:8181"
    volumes:
      - ./policies:/policies     # Tes fichiers .rego
    networks:
      - nexus-net

  # ── BATFISH (Validation réseau) ────────────────────────────────────────────
  batfish:
    image: batfish/allinone:latest
    container_name: nexus-batfish
    restart: unless-stopped
    ports:
      - "9996:9996"   # API Batfish
      - "9997:9997"
    volumes:
      - batfish_data:/data
    networks:
      - nexus-net

  # ── OWASP THREAT DRAGON (Modélisation des menaces) ────────────────────────
  threat-dragon:
    image: owasp/threat-dragon:latest
    container_name: nexus-threat-dragon
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - ENCRYPTION_KEYS=[{"isPrimary":true,"id":1,"value":"nexus-compose-key-32chars!!"}]
      - ENCRYPTION_JWT_SIGNING_KEY=nexus-jwt-secret-key
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
    ports:
      - "3000:3000"
    networks:
      - nexus-net

  # ── LEON AI (Voice Assistant) ──────────────────────────────────────────────
  leon:
    build:
      context: .
      dockerfile: Dockerfile
      target: leon
    container_name: nexus-leon
    restart: unless-stopped
    working_dir: /opt/leon
    command: npm start
    ports:
      - "1337:1337"
    environment:
      - NODE_ENV=production
    networks:
      - nexus-net

# ── VOLUMES PERSISTANTS ────────────────────────────────────────────────────────
volumes:
  neo4j_data:
  neo4j_logs:
  batfish_data:

# ── RÉSEAU INTERNE ─────────────────────────────────────────────────────────────
networks:
  nexus-net:
    driver: bridge
