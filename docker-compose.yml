# ══════════════════════════════════════════════════════════════════════════════
# docker-compose.yml — Nexus Compose / Vocal Vibecoding Factory
#
# USAGE :
#   ./scripts/launch.sh                     # lancement standard (recommandé)
#
#   docker compose up --build               # 7 services de base
#   docker compose --profile fullstack up   # + OpenHands (8 services)
#   docker compose run  app python -m nexus_compose run
#   docker compose exec app python -m pytest test/ -v
#
# PRÉ-REQUIS : scripts/bootstrap.sh doit avoir été exécuté au moins une fois.
#
# SERVICES (7 standard + 1 fullstack) :
#   app            — nexus_compose CLI / orchestrateur
#   neo4j          — graphe de connaissance (bolt:7687, http:7474)
#   opa            — Open Policy Agent (http:8181)
#   batfish        — analyseur réseau (grpc:9996, thrift:9997)
#   threat-dragon  — modélisation des menaces (http:3000)
#   leon           — assistant IA (http:1337)
#   openhands      — [profile: fullstack] sandbox d'exécution de code (http:3001)
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── APPLICATION PRINCIPALE ─────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: nexus-compose
    restart: unless-stopped
    privileged: true
    # Reste en vie pour `docker compose exec app ...` / `docker compose run app ...`
    command: ["tail", "-f", "/dev/null"]
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=nexuscompose
      - OPA_URL=http://opa:8181
      - THREAT_DRAGON_URL=http://threat-dragon:3000
      - BATFISH_HOST=batfish
      - OH_BASE_URL=http://openhands:3001
      - PYTHONPATH=/app:/opt/openmanus_rl
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CREWAI_LLM_MODEL=${CREWAI_LLM_MODEL:-gpt-4o-mini}
    env_file:
      - path: .env
        required: false
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      neo4j:
        condition: service_healthy
      opa:
        condition: service_started
      batfish:
        condition: service_started
      threat-dragon:
        condition: service_started
    networks:
      - nexus-net

  # ── NEO4J ──────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: nexus-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/nexuscompose
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "nexuscompose", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - nexus-net

  # ── OPEN POLICY AGENT ──────────────────────────────────────────────────────
  opa:
    image: openpolicyagent/opa:latest-static
    container_name: nexus-opa
    restart: unless-stopped
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-format=json
    ports:
      - "8181:8181"
    volumes:
      - ./policies:/policies
    networks:
      - nexus-net

  # ── BATFISH ────────────────────────────────────────────────────────────────
  batfish:
    image: batfish/allinone:latest
    container_name: nexus-batfish
    restart: unless-stopped
    ports:
      - "9996:9996"
      - "9997:9997"
    volumes:
      - batfish_data:/data
    networks:
      - nexus-net

  # ── OWASP THREAT DRAGON ────────────────────────────────────────────────────
  threat-dragon:
    image: owasp/threat-dragon:latest
    container_name: nexus-threat-dragon
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - 'ENCRYPTION_KEYS=[{"isPrimary":true,"id":1,"value":"nexus-compose-key-32chars!!"}]'
      - ENCRYPTION_JWT_SIGNING_KEY=nexus-jwt-secret-key
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
    ports:
      - "3000:3000"
    networks:
      - nexus-net

  # ── LEON AI (depuis zip local via stage Dockerfile) ────────────────────────
  leon:
    build:
      context: .
      dockerfile: Dockerfile
      target: leon
    container_name: nexus-leon
    restart: unless-stopped
    working_dir: /opt/leon
    command: npm start
    ports:
      - "1337:1337"
    environment:
      - NODE_ENV=production
      - LEON_LANG=${LEON_LANG:-fr-FR}
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:1337/api/v1/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - nexus-net

  # ── OPENHANDS (profile: fullstack) ────────────────────────────────────────
  #
  # Sandbox d'exécution de code pour le Unified System.
  # Démarrage : docker compose --profile fullstack up -d openhands
  #             ou ./scripts/launch.sh --fullstack
  #
  # Pré-requis : scripts/bootstrap.sh doit avoir extrait unified_system/OpenHands/
  # avant que cette image puisse être construite localement.
  # En fallback, on peut pointer vers l'image officielle :
  #   image: docker.all-hands.dev/all-hands-ai/openhands:latest
  #
  openhands:
    profiles: ["fullstack"]
    build:
      context: unified_system/OpenHands
      dockerfile: containers/app/Dockerfile
    container_name: nexus-openhands
    restart: unless-stopped
    privileged: true
    ports:
      - "3001:3000"
    environment:
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=docker.all-hands.dev/all-hands-ai/runtime:latest
      - SANDBOX_USER_ID=${UID:-1000}
      - WORKSPACE_BASE=${PWD}/workspace
      - OH_BASE_URL=http://openhands:3000
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands_workspace:/opt/workspace
    depends_on:
      - app
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - nexus-net

volumes:
  neo4j_data:
  neo4j_logs:
  batfish_data:
  openhands_workspace:

networks:
  nexus-net:
    driver: bridge
